server:
  port: 8080

spring:
  application:
    name: agent-orchestrator
  datasource:
    url: jdbc:postgresql://localhost:5432/agentdb
    username: agent
    password: agent
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
