services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  agent-orchestrator:
    build:
      context: ..
      dockerfile: infra/Dockerfile.agent-orchestrator
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agentdb
      SPRING_DATASOURCE_USERNAME: agent
      SPRING_DATASOURCE_PASSWORD: agent

volumes:
  postgres_data:
